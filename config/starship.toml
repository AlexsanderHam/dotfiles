"$schema" = 'https://starship.rs/config-schema.json'

# ─────────────────────────────────────────────────────────────
# Starship prompt — single line with Catppuccin Mocha palette
# Docs: https://starship.rs/config/
# ─────────────────────────────────────────────────────────────

# Use the Catppuccin Mocha palette (defined at the bottom).
palette = "catppuccin_mocha"

# No blank line between prompts — more compact.
add_newline = false

# Single-line layout: everything on one line.
format = """
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$character"""

# ── Prompt symbol ───────────────────────────────────────────
[character]
success_symbol = "[❯](teal)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

# ── Directory ───────────────────────────────────────────────
[directory]
style = "bold lavender"
truncation_length = 5
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = "  "
read_only_style = "red"

# ── Git ─────────────────────────────────────────────────────
[git_branch]
symbol = ""
style = "bold green"
format = "[$branch]($style) "

[git_status]
style = "bold yellow"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?"
stashed = "\\$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "×"

# ── Command duration ────────────────────────────────────────
[cmd_duration]
min_time = 1_000
format = "took [$duration](bold yellow) "


# ─────────────────────────────────────────────────────────────
# Catppuccin Mocha palette (matches Ghostty theme)
# ─────────────────────────────────────────────────────────────
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
